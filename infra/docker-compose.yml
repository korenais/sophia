services:
  db:
    build:
      context: ../services/db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: ../services/bot
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEOCODING_API_KEY: ${GEOCODING_API_KEY}
      DB_URL: postgresql://postgres:postgres@db:5432/postgres
      BOT_LANGUAGE: ${BOT_LANGUAGE}
      THANKS_TOPIC_ID: ${THANKS_TOPIC_ID}
      BIRTHDAY_TOPIC_ID: ${BIRTHDAY_TOPIC_ID}
      BIRTHDAYS: ${BIRTHDAYS}
      TELEGRAM_GROUP_ID: ${TELEGRAM_GROUP_ID}
      TMA_URL: ${TMA_URL:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../services/frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8055}
        VITE_FRONTEND_PASSWD: ${FRONTEND_PASSWD}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started

  api:
    build:
      context: ../services/api
      args:
        API_PORT: ${API_PORT:-8055}
    environment:
      DB_URL: postgresql://postgres:postgres@db:5432/postgres
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      TELEGRAM_GROUP_ID: ${TELEGRAM_GROUP_ID}
      API_PORT: ${API_PORT:-8055}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      DEV_TMA_BYPASS: ${DEV_TMA_BYPASS:-}
      DEV_TMA_USER_ID: ${DEV_TMA_USER_ID:-999000001}
    ports:
      - "8055:8055"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  tma:
    build:
      context: ../services/tma
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8055}
    restart: unless-stopped
    ports:
      - "${TMA_PORT:-8082}:80"
    depends_on:
      api:
        condition: service_started

volumes:
  db_data:
