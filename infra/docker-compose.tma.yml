services:
  frontend:
    build:
      context: ../services/frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8055}
        VITE_FRONTEND_PASSWD: ${FRONTEND_PASSWD}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
      api-tma:
        condition: service_started
      tma:
        condition: service_started

  api-tma:
    build:
      context: ../services/api
      args:
        API_PORT: 8055
    environment:
      DB_URL: postgresql://postgres:postgres@db:5432/postgres
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      TELEGRAM_GROUP_ID: ${TELEGRAM_GROUP_ID}
      API_PORT: 8055
      CORS_ALLOWED_ORIGINS: ${TMA_CORS_ALLOWED_ORIGINS:-https://vm18.digisoov.ee}
      DEV_TMA_BYPASS: ${DEV_TMA_BYPASS:-}
      DEV_TMA_USER_ID: ${DEV_TMA_USER_ID:-999000001}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  tma:
    build:
      context: ../services/tma
      args:
        VITE_API_BASE_URL: ${TMA_VITE_API_BASE_URL:-/api}
        VITE_APP_BASE_PATH: ${TMA_VITE_APP_BASE_PATH:-/}
    restart: unless-stopped
    depends_on:
      api-tma:
        condition: service_started
